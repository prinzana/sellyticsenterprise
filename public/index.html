  <!-- Structured Data: FAQ (matches FAQSection.jsx) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",

        {
          "@type": "Question",
          "name": "Does Sellytics work without internet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Sellytics is built offline-first. You can record sales, add products, manage inventory, and run your entire business without internet. All changes automatically sync when you reconnect."
          }
        },
        {
          "@type": "Question",
          "name": "How does Sellytics work on slow 2G/3G networks?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sellytics is optimized for low-bandwidth areas. We use intelligent data compression and smart caching to ensure lightning-fast performance even on 2G networks. Most actions use less than 50KB of data."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get started with Sellytics?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simply click Start Free Trial and create your account. Our setup wizard will guide you through adding your first products and making your first sale. Most users are fully set up within 10 minutes."
          }
        },
        {
          "@type": "Question",
          "name": "Can I import my existing inventory into Sellytics?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! You can import products via CSV file, or use our bulk add feature. We also offer migration assistance for Premium and Business plan users."
          }
        },
        {
          "@type": "Question",
          "name": "Is my business data secure with Sellytics?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. We use bank-level encryption for all data, regular automated backups, and comply with international data protection standards. Your business data is safe with us."
          }
        },
        {
          "@type": "Question",
          "name": "Can I manage multiple stores with Sellytics?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, our Business plan supports up to 3 stores with a centralized dashboard. You can view sales, inventory, and staff activity across all locations in real-time."
          }
        },
        {
          "@type": "Question",
          "name": "Is Sellytics easy to use for non-technical people?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely! Sellytics has a simplified UX designed for all literacy levels and technical abilities. Your entire team — from market vendors to store managers — can use it from day one."
          }
        },
        {
          "@type": "Question",
          "name": "What kind of customer support does Sellytics offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Free users get email support. Premium users enjoy 24/7 priority support via chat and phone. Business users get a dedicated account manager."
          }
        },
        {
          "@type": "Question",
          "name": "What is Sellytics and who is it for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sellytics is a mobile-first, offline-ready inventory management and sales tracking platform built for retail businesses in Africa and emerging markets. It's perfect for phone shops, supermarkets, open market vendors, multi-store owners, and distributors."
          }
        },
        {
          "@type": "Question",
          "name": "Does Sellytics have a free plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Sellytics offers a free plan that includes up to 50 products, basic sales tracking, inventory management, and expense tracking with 30-day sales history. Upgrade anytime for unlimited products and advanced features."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Sellytics cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sellytics offers three plans: Free (₦0/month), Premium (₦15,000/month) for growing businesses with unlimited products and team collaboration, and Business (₦25,000/month) for multi-store operations with up to 3 stores and a dedicated account manager. Save 20% with yearly billing."
          }
        },
        {
          "@type": "Question",
